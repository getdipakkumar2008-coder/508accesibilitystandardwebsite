@if (isOpen) {
  <div class="app-dialog__backdrop" tabindex="-1" (click)="close()" (keydown)="handleBackdropKeydown($event)">
    <section
      #panel
      class="app-dialog"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId"
      tabindex="-1"
      (click)="$event.stopPropagation()"
      (keydown)="handleKeydown($event)"
    >
      <div class="app-dialog__header">
        <h2 class="app-dialog__title" [id]="titleId">{{ title }}</h2>
        <button class="usa-button usa-button--unstyled app-dialog__close" type="button" [attr.aria-label]="closeLabel" (click)="close()">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="app-dialog__content">
        <ng-content />
      </div>
    </section>
  </div>
}

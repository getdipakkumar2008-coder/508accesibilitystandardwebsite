<!-- Skip link: first focusable element, lets keyboard/SR users jump to content -->
<a class="usa-skipnav" href="#main-content">Skip to main content</a>

<header class="usa-header usa-header--basic">
  <div class="usa-nav-container">
    <div class="usa-navbar">
      <span class="usa-logo">
        <a routerLink="/" [title]="title">{{ title }}</a>
      </span>
    </div>
    <app-navigation />
  </div>
</header>

<main id="main-content" tabindex="-1">
  <router-outlet />
</main>

<footer class="usa-footer usa-footer--slim">
  <div class="grid-container usa-footer__return-to-top">
    <a href="#main-content">Return to top</a>
  </div>
  <div class="usa-footer__primary-section">
    <div class="grid-container">
      <p class="usa-footer__logo-heading">{{ title }}</p>
      <p>Committed to Section 508 and WCAG 2.1 AA conformance.</p>
      <nav aria-label="Footer navigation" class="app-footer-nav">
        <ul class="usa-list usa-list--unstyled app-footer-nav__list">
          <li><a routerLink="/">Home</a></li>
          <li><a routerLink="/about">About</a></li>
          <li><a routerLink="/services">Services</a></li>
          <li><a routerLink="/contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </div>
</footer>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, a11y tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (includes template accessibility rules)
        run: npm run lint

      - name: Unit + accessibility tests (axe)
        run: npm run test:ci

      - name: Production build
        run: npm run build

  backend:
    name: Backend (build, tests, security audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend.Tests/Backend.Tests.csproj

      - name: Build (Release)
        run: dotnet build backend.Tests/Backend.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test backend.Tests/Backend.Tests.csproj --no-build --configuration Release

      - name: Vulnerable package audit
        run: dotnet list backend/Backend.csproj package --vulnerable --include-transitive

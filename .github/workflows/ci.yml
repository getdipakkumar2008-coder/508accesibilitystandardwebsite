name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, tests, a11y, build, e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (includes Angular template accessibility rules)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test:ci

      - name: Build Angular app
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Serve built app
        run: |
          npx http-server dist/frontend/browser -p 4173 -a 127.0.0.1 -c-1 -P http://127.0.0.1:4173? > /tmp/frontend-http-server.log 2>&1 &
          echo $! > /tmp/frontend-http-server.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            if ! kill -0 "$(cat /tmp/frontend-http-server.pid)" 2>/dev/null; then
              cat /tmp/frontend-http-server.log
              exit 1
            fi
            sleep 1
          done
          cat /tmp/frontend-http-server.log
          exit 1

      - name: Pa11y checks
        run: |
          npx pa11y http://127.0.0.1:4173/ --config pa11y.json
          npx pa11y http://127.0.0.1:4173/contact --config pa11y.json

      - name: Axe-core checks (Playwright)
        run: E2E_BASE_URL=http://127.0.0.1:4173 npm run e2e:ci

      - name: Lighthouse CI (accessibility)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/contact
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop built app server
        if: always()
        run: |
          if [ -f /tmp/frontend-http-server.pid ]; then
            kill "$(cat /tmp/frontend-http-server.pid)" || true
          fi

  backend:
    name: Backend (.NET build and tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Build backend
        working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - name: Test backend
        working-directory: backend.Tests
        run: dotnet test --configuration Release
